<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/Templates/SilmeTemplate.xhtml">


    <ui:define name="title">Kullanıcı Silme İşlemleri</ui:define>

    <ui:define name="geriButtonTemplate">
        <h:commandLink value="Geri" action="KullanıcıIslemleri.xhtml" styleClass="geriButton" />
    </ui:define>

    <ui:define name="silmeKısımlari">
        <h:dataTable value="#{kullanıcıBean.list}" var="kullanıcı"  styleClass="table table-striped">

            <h:column  styleClass="font-weight-bold">
                <f:facet   name="header">Kullanıcı Adı</f:facet>
                <br>#{kullanıcı.kullanıcıadı}</br>
            </h:column>

            <h:column  styleClass="font-weight-bold">
                <f:facet   name="header">Sifre</f:facet>
                <br>#{kullanıcı.sifre}</br>
            </h:column>

            <h:column styleClass="font-weight-bold">
                <f:facet   name="header">İslemler</f:facet>
                <h:commandButton styleClass="btn btn-danger button" action="#{kullanıcıBean.delete(kullanıcı)}" value="Sil" />
            </h:column>
        </h:dataTable>
        <div class="btn-group">
            <h:commandButton action="#{kullanıcıBean.prev()}" value="geri" styleClass="btn btn-outline-dark"></h:commandButton>
            <h:commandButton action="#{kullanıcıBean.next()}" value="ileri" styleClass="btn btn-outline-dark"></h:commandButton>
        </div>
    </ui:define>

</ui:composition>
