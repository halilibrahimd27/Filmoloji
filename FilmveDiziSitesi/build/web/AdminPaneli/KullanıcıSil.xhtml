<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Kullanıcı Silme İşlemleri</title>
        <h:outputStylesheet library="css" name="bootstrap.css" />
        <h:outputStylesheet  name="/adminpanelicss/reset.css" />
        <h:outputStylesheet  name="/adminpanelicss/kullaniciSilİslemleri.css" />
        <script src="https://kit.fontawesome.com/66f2961287.js" crossorigin="anonymous"></script>
    </h:head>
    <h:body>

        <div id="containerr"> 
            <h:form>
                <h:commandLink value="Geri" action="KullanıcıIslemleri.xhtml" styleClass="geriButton" />

                <h:dataTable value="#{kullanıcıBean.list}" var="kullanıcı"  styleClass="table table-striped">

                    <h:column  styleClass="font-weight-bold">
                        <facet   name="header">Kullanıcı Adı</facet>
                            #{kullanıcı.kullanıcıadı}
                    </h:column>

                    <h:column styleClass="font-weight-bold">
                        <facet   name="header">Şifre</facet>
                            #{kullanıcı.sifre}
                    </h:column>

                    <h:column styleClass="font-weight-bold">
                        <facet   name="header">Sil</facet>
                        <h:commandButton styleClass="btn btn-danger button" action="#{kullanıcıBean.delete(kullanıcı)}" value="Sil" />
                    </h:column>
                </h:dataTable>
                <div class="btn-group">
                    <h:commandButton action="#{filmolojiBean.prev()}" value="geri" styleClass="btn btn-outline-dark"></h:commandButton>
                    <h:commandButton action="#{filmolojiBean.next()}" value="ileri" styleClass="btn btn-outline-dark"></h:commandButton>
                </div>   
            </h:form>

        </div>
    </h:body>
</html>
