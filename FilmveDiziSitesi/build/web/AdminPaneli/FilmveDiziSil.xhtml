<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/Templates/SilmeTemplate.xhtml">


    <ui:define name="title">Film Silme İşlemleri</ui:define>

    <ui:define name="geriButtonTemplate">
        <h:commandLink value="Geri" action="FilmveDiziİslemleri.xhtml" styleClass="geriButton" />
    </ui:define>

    <ui:define name="silmeKısımlari">
        <h:dataTable value="#{filmveDiziBean.list}" var="film"  styleClass="table table-striped">

            <h:column  styleClass="font-weight-bold " style="text-align: center;">
                <f:facet   name="header" styleClass="orta">İD </f:facet>
                    #{film.df_id}
            </h:column>

            <h:column  styleClass="font-weight-bold " style="text-align: center;">
                <f:facet   name="header" styleClass="orta">Türü </f:facet>
                    #{film.tur}
            </h:column>

            <h:column styleClass="font-weight-bold">
                <f:facet   name="header">Adı</f:facet>
                    #{film.adi}
            </h:column>

            <h:column styleClass="font-weight-bold">
                <f:facet  name="header">Konusu</f:facet>
                    #{film.konusu}
            </h:column>

            <h:column styleClass="font-weight-bold">
                <f:facet   name="header">Kategorisi</f:facet>
                    #{film.gönderilecekKategori}
            </h:column>

            <h:column styleClass="font-weight-bold">
                <f:facet   name="header">Yönetmen Adı</f:facet>
                    #{film.yonetmen_adi}
            </h:column>

            <h:column styleClass="font-weight-bold">
                <f:facet   name="header">Oyuncular</f:facet>
                    #{film.oyuncular}
            </h:column>

            <h:column styleClass="font-weight-bold">
                <f:facet   name="header">Vizyon ya da TrenddeMi</f:facet>
                    #{film.vizyontrend}
            </h:column>

            <h:column styleClass="font-weight-bold" >
                <f:facet   name="header">İşlem</f:facet>
                <div class="button-flex">
                    <h:commandButton styleClass="btn btn-danger button"  value="Sil" action="#{filmveDiziBean.delete(film)}"  />
                    
                    <h:commandLink id="guncelle" styleClass="btn btn-primary button" value="Güncelle"  action="FilmveDiziGüncelle.xhtml"  />
                </div>



            </h:column>

        </h:dataTable>

        <div class="btn-group">
            <h:commandButton action="#{filmveDiziBean.prev()}" value="geri" styleClass="btn btn-outline-dark"></h:commandButton>
            <h:commandButton action="#{filmveDiziBean.next()}" value="ileri" styleClass="btn btn-outline-dark"></h:commandButton>
        </div>
    </ui:define>

</ui:composition>
