<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/Templates/EklemeTemplate.xhtml">

    <ui:define name="title">Film ve Dizi Ekleme İşlemleri </ui:define>

    <ui:define name="geriButtonTemplate">
        <h:commandLink value="Geri" action="Filmİslemleri.xhtml" styleClass="geriButton" />
    </ui:define>

    <ui:define name="eklemeKısımlari">
        <h:form id="film-islemleri">
            <div class="film-container">
                <h1>Türü : </h1>
                <h:inputText  value="#{filmolojiBean.entity.tür}" styleClass="filmEkleme " ></h:inputText>
            </div>

            <div class="film-container">
                <h1> Adı : </h1>
                <h:inputText  value="#{filmolojiBean.entity.adı}" styleClass="filmEkleme" ></h:inputText>
            </div>
            <div class="film-container">
                <h1> Konusu : </h1>
                <h:inputTextarea styleClass="filmEkleme konu"  value="#{filmolojiBean.entity.konusu}" />
            </div>

            <div class="film-container">
                <h1> Kategorisi : </h1>
                <h:inputText  value="#{filmolojiBean.entity.kategori}" styleClass="filmEkleme" ></h:inputText>

            </div>

            <div class="film-container">
                <h1> Yönetmen Adı : </h1>
                <h:inputText  value="#{filmolojiBean.entity.yönetmenadı}" styleClass="filmEkleme" ></h:inputText>
            </div>

            <div class="film-container">
                <h1> Oyuncular : </h1>
                <h:inputTextarea styleClass="filmEkleme konu"  value="#{filmolojiBean.entity.oyuncular}"/>
            </div>

            <!--            <div class="film-container">
                            <h1>Film Fragmanı : </h1>
                            <input type="file" name="dosya" accept="video/*" class="filmEkleme fragmani" />
                        </div>-->

            <div class="film-container">
                <h1>Vizyonda ya da TrenddeMi : </h1>
                <h:inputText  value="#{filmolojiBean.entity.vizyondamitrenddemi}" styleClass="filmEkleme" ></h:inputText>
            </div>

            <h:commandButton action="#{filmolojiBean.create()}" value="Kaydet"/>
        </h:form>
    </ui:define>

</ui:composition>
