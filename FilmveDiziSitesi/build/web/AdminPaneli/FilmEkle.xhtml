<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/Templates/EklemeTemplate.xhtml">

    <ui:define name="title">Film Ekleme İşlemleri </ui:define>

    <ui:define name="geriButtonTemplate">
        <h:commandLink value="Geri" action="Filmİslemleri.xhtml" styleClass="geriButton" />
    </ui:define>

    <ui:define name="eklemeKısımlari">
        <h:form id="film-islemleri">
            <div class="film-container">
                <h1>Film Adı : </h1>
                <h:inputText  value=" " styleClass="filmEkleme ad" ></h:inputText>
            </div>
            <div class="film-container">
                <h1>Film Konusu : </h1>
                <h:inputTextarea styleClass="filmEkleme konu"  value=" " rows="5" cols="30" />

            </div>
            <div class="film-container">
                <h1>Film Türü : </h1>
                <h:selectOneMenu styleClass="browserss">
                    <f:selectItem  itemLabel="Yerli" />
                    <f:selectItem  itemLabel="Yabancı" />
                </h:selectOneMenu>
            </div>
            <div class="film-container">
                <h1>Film Kategori : </h1>
                <h:selectManyListbox styleClass="browsersss" value="#" size="5">
                    <f:selectItem itemValue="macera" itemLabel="Hepsi" />
                    <f:selectItem itemValue="aksiyon" itemLabel="Macera" />
                    <f:selectItem itemValue="komedi" itemLabel="Aksyion" />
                    <f:selectItem itemValue="komedi" itemLabel="Komedi" />
                    <f:selectItem itemValue="komedi" itemLabel="Korku" />
                    <f:selectItem itemValue="komedi" itemLabel="Bilim Kurgu" />
                </h:selectManyListbox>
            </div>

            <div class="film-container">
                <h1>Film Fragmanı : </h1>
                <input type="file" name="dosya" accept="video/*" class="filmEkleme fragmani" />
            </div>

            <div class="film-container">
                <h1>VizyondaMı : </h1>
                <h:selectOneMenu styleClass="browsers">
                    <f:selectItem  itemLabel="Evet" />
                    <f:selectItem  itemLabel="Hayır" />
                </h:selectOneMenu>
            </div>

            <h:commandButton value="Filmi Ekle" action="#" styleClass="filmEkleButton" />
        </h:form>
    </ui:define>

</ui:composition>
