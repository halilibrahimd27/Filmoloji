<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <title>Film Ekleme İşlemleri</title>
        <h:outputStylesheet  name="/kendicssim/reset.css" />
        <h:outputStylesheet  name="/kendicssim/FilmEkleİslemleri.css" />
        <script src="https://kit.fontawesome.com/66f2961287.js" crossorigin="anonymous"></script>
    </h:head>
    <h:body>

        
        <h:form id="film-islemleri">
            <h:commandButton value="Geri" action="Filmİslemleri.xhtml" styleClass="geriButton" />
            <div class="film-container">
                <h1>Film Adı : </h1>
                <h:inputText  value=" " styleClass="filmEkleme ad" ></h:inputText>
            </div>
            <div class="film-container">
                <h1>Film Konusu : </h1>
                <h:inputTextarea styleClass="filmEkleme konu"  value=" " rows="5" cols="30" />

            </div>
            <div class="film-container">
                <h1>Film Türü : </h1>
                <h:inputText  value=" " styleClass="filmEkleme tür"  ></h:inputText>
            </div>
            <div class="film-container">
                <h1>Film Kategori : </h1>
                <h:inputText  value=" " styleClass="filmEkleme kategori"  ></h:inputText>
            </div>

            <div class="film-container">
                <h1>Film Fragmanı : </h1>
                <input type="file" name="dosya" accept="video/*" class="filmEkleme fragmani" />

            </div>

            <div class="film-container">
                <h1>VizyondaMı : </h1>
                <h:selectOneMenu styleClass="browsers">
                    <f:selectItem  itemLabel="Evet" />
                    <f:selectItem  itemLabel="Hayır" />
                </h:selectOneMenu>

            </div>

            <h:commandButton value="Filmi Ekle" action="#" styleClass="filmEkleButton" />
        </h:form>

    </h:body>
</html>
