<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/Templates/SilmeTemplate.xhtml">


    <ui:define name="title">Film ve Dizi Silme İşlemleri</ui:define>

    <ui:define name="geriButtonTemplate">
        <h:commandLink value="Geri" action="Filmİslemleri.xhtml" styleClass="geriButton" />
    </ui:define>

    <ui:define name="silmeKısımlari">
        <h:dataTable value="#{filmolojiBean.list}" var="dizifilm"  styleClass="table table-striped">

            <h:column  styleClass="font-weight-bold">
                <f:facet   name="header">Türü</f:facet>
                <br>#{dizifilm.tür}</br>
            </h:column>

            <h:column  styleClass="font-weight-bold">
                <f:facet   name="header">Adı</f:facet>
                <br>#{dizifilm.adı}</br>
            </h:column>

            <h:column  styleClass="font-weight-bold">
                <f:facet   name="header">Konusu</f:facet>
                <br>#{dizifilm.konusu}</br>
            </h:column>

            <h:column  styleClass="font-weight-bold">
                <f:facet   name="header">Kategori</f:facet>
                <br>#{dizifilm.kategori}</br>
            </h:column>

            <h:column  styleClass="font-weight-bold">
                <f:facet   name="header">yönetmenadı</f:facet>
                <br>#{dizifilm.yönetmenadı}</br>
            </h:column>


            <h:column styleClass="font-weight-bold">
                <f:facet   name="header">oyuncular</f:facet>
                <br>#{dizifilm.oyuncular}</br>
            </h:column>

            <h:column styleClass="font-weight-bold">
                <f:facet   name="header">Vizyontrend</f:facet>
                <br>#{dizifilm.vizyondamitrenddemi}</br>
            </h:column>

            <h:column styleClass="font-weight-bold">
                <f:facet   name="header">Sil</f:facet>
                <h:commandButton styleClass="btn btn-danger button" action="#{filmolojiBean.delete(dizifilm)}" value="Sil" />
            </h:column>
        </h:dataTable>
        <div class="btn-group">
            <h:commandButton action="#{filmolojiBean.prev()}" value="geri" styleClass="btn btn-outline-dark"></h:commandButton>
            <h:commandButton action="#{filmolojiBean.next()}" value="ileri" styleClass="btn btn-outline-dark"></h:commandButton>
        </div>
    </ui:define>

</ui:composition>
